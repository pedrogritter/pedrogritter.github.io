<footer class="max-w-3xl mx-auto px-6 md:px-8 py-12 border-t border-surface-border relative z-10">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 text-sm text-text-muted reveal">
    <span>Pedro Gritter</span>
    <div class="flex items-center gap-4">
      {% for link in site.data.social %}
      <a
        href="{{ link.url }}"
        class="hover:text-text-primary transition-colors duration-200"
        style="text-decoration: none;"
        {% if link.url contains "http" %}target="_blank" rel="noopener noreferrer"{% endif %}
      >
        {{ link.name }}
      </a>
      {% endfor %}
    </div>
  </div>
</footer>
