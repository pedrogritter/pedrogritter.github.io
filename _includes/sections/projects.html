<section id="projects" class="section">
  <h2 class="section-heading reveal">Projects</h2>

  <div class="space-y-6 stagger">
    {% for project in site.data.projects %}
    <div class="card reveal">
      <div class="flex flex-col sm:flex-row sm:items-baseline sm:justify-between gap-1 mb-2">
        <h3>
          {% if project.url %}
          <a href="{{ project.url }}" target="_blank" rel="noopener noreferrer">
            {{ project.title }}
          </a>
          {% else %}
          {{ project.title }}
          {% endif %}
        </h3>
        <span class="text-xs text-text-muted font-mono">{{ project.type }}</span>
      </div>

      <p class="text-sm text-text-secondary mb-3">{{ project.description }}</p>

      <div class="flex flex-wrap gap-2">
        {% for t in project.tech %}
        <span class="tag">{{ t }}</span>
        {% endfor %}
      </div>
    </div>
    {% endfor %}
  </div>
</section>
