<section class="section">
  <h2 class="section-heading reveal">Education</h2>

  <div class="space-y-4 stagger">
    {% for edu in site.data.education %}
    <div class="reveal flex flex-col sm:flex-row sm:items-baseline sm:justify-between gap-1">
      <div>
        <h3 class="text-text-primary">{{ edu.degree }}</h3>
        <p class="text-sm text-text-secondary">{{ edu.institution }}</p>
      </div>
      <span class="text-sm text-text-muted whitespace-nowrap">{{ edu.dates }}</span>
    </div>
    {% endfor %}
  </div>
</section>
